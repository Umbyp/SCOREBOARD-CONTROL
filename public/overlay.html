<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Basketball Overlay - Flat & Smooth Sync</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow+Condensed:wght@500;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    /* 1920x1080 Layout for OBS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent !important; }

    #score-bug {
      position: absolute; top: 40px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
    }
    #main-bar {
      display: flex; height: 76px;
      background: rgba(14,16,24,0.97);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 40px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    /* Team Styling */
    .team-box { display: flex; align-items: stretch; height: 100%; }
    .color-strip { width: 5px; background: var(--tc); flex-shrink: 0; }

    /* LOGO Logic */
    .logo-wrap { width: 60px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); flex-shrink: 0; position: relative; }
    .logo-img { width: 46px; height: 46px; object-fit: contain; border-radius: 4px; opacity: 0; transition: opacity 0.4s; }
    .logo-img.show { opacity: 0.92; }
    .logo-ph { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: var(--tc); opacity: 0.2; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue',sans-serif; font-size: 20px; color: #fff; }
    .logo-ph.hide { opacity: 0; pointer-events: none; }

    .team-info { display: flex; flex-direction: column; justify-content: center; padding: 0 14px; width: 190px; overflow: hidden; }
    #box-a .team-info { align-items: flex-start; }
    #box-b .team-info { align-items: flex-end; }
    
    .name-row { display: flex; align-items: center; gap: 7px; width: 100%; }
    #box-b .name-row { flex-direction: row-reverse; }
    
    .poss { font-family: 'Oswald',sans-serif; font-size: 15px; color: var(--tc); visibility: hidden; }
    .poss.on { visibility: visible; animation: poss-pulse 1.5s infinite; }
    @keyframes poss-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    
    .tname { font-family: 'Oswald',sans-serif; font-size: 26px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; line-height: 1.1; }
    
    .meta-row { display: flex; gap: 8px; align-items: center; margin-top: 3px; width: 100%; }
    #box-b .meta-row { flex-direction: row-reverse; }
    
    .torow { display: flex; gap: 3px; }
    .tp { width: 13px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.12); }
    .tp.on { background: #fff; }
    
    .foul-num { font-family: 'Oswald',sans-serif; font-size: 14px; font-weight: 700; color: #fff; }
    .bonus-tag { display: none; font-family: 'Barlow Condensed',sans-serif; font-size: 10px; font-weight: 800; color: #FFD700; padding: 1px 5px; border-radius: 3px; background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.3); }
    .bonus-tag.on { display: block; }
    
    .score-area { width: 88px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.45); }
    .score-num { font-family: 'Oswald',sans-serif; font-size: 54px; font-weight: 700; color: var(--tc); line-height: 1; }
    .score-num.bump { animation: score-bump 0.3s ease-out; }
    @keyframes score-bump { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

    /* --- NEW CENTER BLOCK (Fixed Width & Tabular Nums) --- */
    #center-block {
      width: 250px; /* Fixed Width ป้องกันกล่องขยับ */
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.6);
      position: relative;
    }
    
    #jump-indicator {
      position: absolute;
      top: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 800;
      color: #FFD700;
      letter-spacing: 0.2em;
      display: none;
    }

    .clock-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 90px;
    }

    .clock-lbl {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      margin-bottom: -3px;
    }

    #mclock, #shotval {
      font-family: 'Oswald', sans-serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums; /* ล็อคความกว้างตัวเลขทุกตัวให้เท่ากัน */
    }

    #mclock { color: #FFF; }
    #mclock.expired { color: #FF2222; }

    #shotval { color: #FFD700; }
    #shot-col.urgent .clock-lbl { color: #FF3333; }
    #shot-col.urgent #shotval { color: #FF3333; }

    .period-divider {
      width: 44px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      margin: 0 5px;
    }
    #qlabel {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #FFD700;
    }

    /* Overlay Callouts */
    #timeout-overlay { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%) translateY(30px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #timeout-overlay.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    #to-main { display: flex; background: rgba(10,10,20,0.95); border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    #to-text { padding: 15px 25px; }
    #to-team-name { font-family: 'Oswald',sans-serif; font-size: 32px; font-weight: 700; line-height: 1; }
    
    #score-flash { position: absolute; top: 130px; left: 50%; transform: translateX(-50%) scale(0.8); opacity: 0; background: rgba(10,10,20,0.95); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #score-flash.show { opacity: 1; transform: translateX(-50%) scale(1); }
  </style>
</head>
<body>

<div id="score-bug">
  <div id="main-bar">
    <div class="team-box" id="box-a" style="--tc:#FF6B35;">
      <div class="color-strip"></div>
      <div class="logo-wrap">
        <div id="logo-ph-a" class="logo-ph">H</div>
        <img id="logo-img-a" class="logo-img" src="" alt="logo" />
      </div>
      <div class="team-info">
        <div class="name-row">
          <div class="poss" id="poss-a">◀</div>
          <div class="tname" id="nm-a">HOME</div>
        </div>
        <div class="meta-row">
          <div class="torow" id="to-a"></div>
          <div class="foul-num" id="fn-a">0</div>
          <div class="bonus-tag" id="bt-a">BONUS</div>
        </div>
      </div>
      <div class="score-area"><div class="score-num" id="sc-a">0</div></div>
    </div>

    <div id="center-block">
      <div id="jump-indicator">⊕ JUMP</div>
      
      <div class="clock-col">
        <div class="clock-lbl">GAME</div>
        <div id="mclock">10:00</div>
      </div>

      <div class="period-divider">
        <div id="qlabel">Q1</div>
      </div>

      <div class="clock-col" id="shot-col">
        <div class="clock-lbl">SHOT</div>
        <div id="shotval">24</div>
      </div>
    </div>

    <div class="team-box" id="box-b" style="--tc:#00D4FF;">
      <div class="score-area"><div class="score-num" id="sc-b">0</div></div>
      <div class="team-info">
        <div class="name-row">
          <div class="poss" id="poss-b">▶</div>
          <div class="tname" id="nm-b">AWAY</div>
        </div>
        <div class="meta-row">
          <div class="torow" id="to-b"></div>
          <div class="foul-num" id="fn-b">0</div>
          <div class="bonus-tag" id="bt-b">BONUS</div>
        </div>
      </div>
      <div class="logo-wrap">
        <div id="logo-ph-b" class="logo-ph">A</div>
        <img id="logo-img-b" class="logo-img" src="" alt="logo" />
      </div>
      <div class="color-strip"></div>
    </div>
  </div>
</div>

<div id="timeout-overlay">
  <div id="to-main">
    <div id="to-bar" style="width:8px; background: #FFD700;"></div>
    <div id="to-text">
      <div id="to-team-name">TEAM NAME</div>
      <div style="font-family:'Barlow Condensed'; font-size:14px; color:rgba(255,255,255,0.5); letter-spacing:0.2em;">TIMEOUT</div>
    </div>
  </div>
</div>

<div id="score-flash">
  <div style="padding: 10px 30px; display: flex; align-items: center; gap: 15px;">
    <div id="sf-bar" style="width:4px; height:40px; background:#FFD700;"></div>
    <div style="display:flex; flex-direction:column;">
        <div id="sf-pts" style="font-family:'Oswald'; font-size:32px; color:#fff; line-height:1;">+2</div>
        <div id="sf-team" style="font-family:'Barlow Condensed'; font-size:12px; color:rgba(255,255,255,0.5);">TEAM NAME</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const SERVER_URL = "https://scoreboard-control.onrender.com";

  // --- 1. Firebase Setup ---
  firebase.initializeApp({
    apiKey: "AIzaSyBUOuEb5MWvZg2BWka1RPn5Qy4WDSDSO3I",
    authDomain: "basketball-tournament-62372.firebaseapp.com",
    databaseURL: "https://basketball-tournament-62372-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "basketball-tournament-62372",
  });
  const fbDb = firebase.database();

  let localState = null;
  let lastUpdateTimestamp = 0;
  let prevState = null;

  // --- 2. Format Helpers ---
  function fmtMain(t) {
    t = Math.max(0, t);
    if (t > 600) {
      const s = Math.floor(t / 10);
      return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
    }
    return (t / 10).toFixed(1);
  }
  function fmtShot(t) {
    t = Math.max(0, t);
    return t > 100 ? Math.ceil(t / 10) : (t / 10).toFixed(1);
  }

  // --- 3. Main Update Function ---
  function render(s) {
    if (!s || !s.teamA) return;

    if (prevState) {
      if (s.teamA.score > prevState.teamA.score) flashScore(s.teamA.name, s.teamA.color, s.teamA.score - prevState.teamA.score, 'a');
      if (s.teamB.score > prevState.teamB.score) flashScore(s.teamB.name, s.teamB.color, s.teamB.score - prevState.teamB.score, 'b');
      if (s.teamA.timeouts < prevState.teamA.timeouts) showTO(s.teamA.name, s.teamA.color);
      if (s.teamB.timeouts < prevState.teamB.timeouts) showTO(s.teamB.name, s.teamB.color);
    }

    updateTeam('a', s.teamA, s.possession === 'teamA');
    updateTeam('b', s.teamB, s.possession === 'teamB');

    // Period & Jumpball Indicator
    document.getElementById('qlabel').textContent = s.quarter > 4 ? `OT${s.quarter-4}` : `Q${s.quarter}`;
    document.getElementById('jump-indicator').style.display = s.jumpBall ? "block" : "none";

    prevState = JSON.parse(JSON.stringify(s));
    localState = s;
    lastUpdateTimestamp = Date.now();
  }

  function updateTeam(id, team, isPoss) {
    const box = document.getElementById(`box-${id}`);
    box.style.setProperty('--tc', team.color);
    document.getElementById(`sc-${id}`).textContent = team.score;
    
    // Auto scale name based on length
    const nmEl = document.getElementById(`nm-${id}`);
    nmEl.textContent = team.name;
    const l = team.name.length;
    nmEl.style.fontSize = l <= 8 ? "26px" : l <= 12 ? "20px" : "16px";

    document.getElementById(`fn-${id}`).textContent = team.teamFouls;
    document.getElementById(`fn-${id}`).style.color = team.teamFouls >= 5 ? "#FFA500" : "#fff";
    document.getElementById(`bt-${id}`).className = `bonus-tag ${team.teamFouls >= 5 ? 'on' : ''}`;
    document.getElementById(`poss-${id}`).className = `poss ${isPoss ? 'on' : ''}`;
    
    const toWrap = document.getElementById(`to-${id}`);
    toWrap.innerHTML = '';
    for(let i=0; i<3; i++) {
        const dot = document.createElement('div');
        dot.className = `tp ${i < team.timeouts ? 'on' : ''}`;
        toWrap.appendChild(dot);
    }
  }

  // --- 4. Smooth Clock Interpolation ---
  function syncLoop() {
    // Game Clock
    if (localState && localState.isRunning) {
      const elapsed = Date.now() - lastUpdateTimestamp;
      const currentTenths = Math.max(0, localState.clockTenths - Math.floor(elapsed / 100));
      document.getElementById('mclock').textContent = fmtMain(currentTenths);
      document.getElementById('mclock').classList.toggle('expired', currentTenths <= 0);
    } else if (localState) {
      document.getElementById('mclock').textContent = fmtMain(localState.clockTenths);
    }

    // Shot Clock
    if (localState) {
      let currentShot = localState.shotClockTenths;
      if (localState.shotRunning) {
        const elapsed = Date.now() - lastUpdateTimestamp;
        currentShot = Math.max(0, localState.shotClockTenths - Math.floor(elapsed / 100));
      }
      
      document.getElementById('shotval').textContent = fmtShot(currentShot);
      
      // Urgent styling (<= 5 seconds)
      if (currentShot <= 50 && currentShot > 0) {
        document.getElementById('shot-col').classList.add('urgent');
      } else {
        document.getElementById('shot-col').classList.remove('urgent');
      }
    }

    requestAnimationFrame(syncLoop);
  }
  requestAnimationFrame(syncLoop);

  // --- 5. Visual Effects ---
  function flashScore(name, color, pts, side) {
    const el = document.getElementById('score-flash');
    const sc = document.getElementById(`sc-${side}`);
    document.getElementById('sf-pts').textContent = `+${pts}`;
    document.getElementById('sf-team').textContent = name;
    document.getElementById('sf-bar').style.background = color;
    el.classList.add('show');
    sc.classList.add('bump');
    setTimeout(() => { el.classList.remove('show'); sc.classList.remove('bump'); }, 2500);
  }

  function showTO(name, color) {
    const el = document.getElementById('timeout-overlay');
    document.getElementById('to-team-name').textContent = name;
    document.getElementById('to-team-name').style.color = color;
    document.getElementById('to-bar').style.background = color;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 5000);
  }

  // --- 6. Firebase Logo Sync ---
  fbDb.ref('player_data/teamA/logo').on('value', snap => updateLogo('a', snap.val()));
  fbDb.ref('player_data/teamB/logo').on('value', snap => updateLogo('b', snap.val()));

  function updateLogo(id, url) {
    const img = document.getElementById(`logo-img-${id}`);
    const ph = document.getElementById(`logo-ph-${id}`);
    if (url && url.trim() !== "") {
      img.src = url;
      img.onload = () => { img.classList.add('show'); ph.classList.add('hide'); };
    } else {
      img.classList.remove('show');
      ph.classList.remove('hide');
    }
  }

  // --- 7. Init Socket ---
  function init() {
    const script = document.createElement('script');
    script.src = `${SERVER_URL}/socket.io/socket.io.js`;
    script.onload = () => {
      const socket = io(SERVER_URL, { reconnection: true });
      socket.on('stateUpdate', render);
    };
    document.head.appendChild(script);
  }
  init();
</script>
</body>
</html>
