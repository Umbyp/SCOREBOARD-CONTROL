<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Basketball Overlay — Thai League</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent !important; }

    :root {
      --gold: #E4BF55;
      --black: #0C0D11;
      --skew: -13deg;
    }

    #score-bug { position: absolute; top: 42px; left: 50%; transform: translateX(-50%); }

    #bar {
      display: flex; align-items: stretch; height: 68px;
      background: var(--black);
      border-radius: 5px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.55);
      overflow: hidden;
      font-family: 'Oswald', sans-serif;
    }

    /* ── League block ─────────────────────────────── */
    #league {
      display: flex; align-items: center; gap: 11px;
      padding: 0 16px 0 13px;
      background: linear-gradient(180deg,#15161c,#0a0b0f);
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    #league .seal {
      width: 42px; height: 42px; border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: rgba(228,191,85,0.06); position: relative;
    }
    #lg-logo { display: none; width: 40px; height: 40px; object-fit: contain; }
    #league .seal.has-logo { border-color: transparent; background: transparent; width: 46px; height: 46px; }
    #league .seal.has-logo svg { display: none; }
    #league .seal.has-logo #lg-logo { display: block; width: 46px; height: 46px; }
    #league .txt { line-height: 1; }
    #league .txt .l1 {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 12px; letter-spacing: 0.14em; color: #EDEFF3;
    }
    #league .txt .l2 {
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 11px; letter-spacing: 0.14em; color: rgba(237,239,243,0.55);
      margin-top: 1px;
    }
    #league .txt .yr {
      font-weight: 700; font-size: 24px; letter-spacing: 0.02em;
      color: var(--gold); margin-top: 1px;
    }

    /* ── Logo cells ───────────────────────────────── */
    .logo-cell {
      width: 58px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: #05060a; position: relative;
    }
    .logo-img { width: 46px; height: 46px; object-fit: contain; opacity: 0; transition: opacity .4s; }
    .logo-img.show { opacity: 1; }
    .logo-ph {
      position: absolute; width: 40px; height: 40px; border-radius: 50%;
      background: var(--tc); opacity: 0.25;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 20px; color: #fff;
    }
    .logo-ph.hide { display: none; }

    /* ── Team name panels (slanted) ───────────────── */
    .panel { position: relative; display: flex; align-items: center; padding: 0 22px; min-width: 168px; }
    #panel-a { padding-left: 18px; padding-right: 28px; margin-left: -10px; }
    #panel-b { padding-right: 18px; padding-left: 28px; margin-right: -10px; }
    .panel .pbg { position: absolute; inset: 0; z-index: 0; transform: skewX(var(--skew)); }
    #panel-a .pbg { background: linear-gradient(180deg,#f4f4f2,#e4e4e0); }
    #panel-b .pbg { background: linear-gradient(180deg, var(--tc), color-mix(in srgb, var(--tc) 74%, #000)); }
    /* gold seam line at the inner (center-facing) edge */
    .panel .seam { position: absolute; top: 0; bottom: 0; width: 4px; background: var(--gold); z-index: 2; transform: skewX(var(--skew)); }
    #panel-a .seam { right: -2px; }
    #panel-b .seam { left: -2px; }
    .panel .inner { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; }
    #panel-b .inner { align-items: flex-end; }

    .tname { font-weight: 700; font-size: 27px; line-height: 1; letter-spacing: 0.02em; white-space: nowrap; }
    #panel-a .tname { color: #17181d; }
    #panel-b .tname { color: var(--gold); }
    .tname.poss { text-shadow: 0 0 1px currentColor; }

    /* foul dashes */
    .dashes { display: flex; gap: 5px; margin-top: 7px; }
    #panel-b .dashes { flex-direction: row-reverse; }
    .dash { width: 20px; height: 3px; border-radius: 2px; transition: background .25s; }
    #panel-a .dash { background: rgba(0,0,0,0.16); }
    #panel-a .dash.on { background: #17181d; }
    #panel-a .dash.bonus { background: #C9483F; }
    #panel-b .dash { background: rgba(255,255,255,0.28); }
    #panel-b .dash.on { background: #fff; }
    #panel-b .dash.bonus { background: var(--gold); }

    /* possession underline */
    .possline { height: 2px; margin-top: 4px; width: 40px; border-radius: 2px; background: transparent; transition: background .3s, box-shadow .3s; }
    #panel-b .possline { align-self: flex-end; }
    .possline.on { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

    /* ── Score cells ──────────────────────────────── */
    .score-cell {
      width: 92px; flex-shrink: 0; position: relative;
      display: flex; align-items: center; justify-content: center;
      background: #0C0D11;
    }
    .score-num { font-weight: 700; font-size: 48px; line-height: 1; color: #fff; font-variant-numeric: tabular-nums; }
    .score-num.bump { animation: bump .34s cubic-bezier(.34,1.56,.64,1); }
    @keyframes bump { 0%{transform:scale(1)} 45%{transform:scale(1.22)} 100%{transform:scale(1)} }

    .plus {
      position: absolute; top: 0; left: 0;
      transform: translate(-50%, 0) scale(0.7);
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 30px; line-height: 1;
      color: var(--gold); opacity: 0; pointer-events: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9), 0 2px 10px rgba(0,0,0,0.7); z-index: 5;
    }
    .plus.go { animation: plusrise 1.15s cubic-bezier(.2,.7,.3,1) forwards; }
    @keyframes plusrise {
      0%   { opacity: 0; transform: translate(-50%, 10px) scale(0.6); }
      18%  { opacity: 1; transform: translate(-50%, -4px) scale(1.2); }
      55%  { opacity: 1; transform: translate(-50%, -26px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50px) scale(0.95); }
    }

    /* center gold divider between the two scores */
    #center-div { width: 3px; flex-shrink: 0; background: var(--gold); transform: skewX(var(--skew)); align-self: stretch; }

    /* ── Info block (period / game / shot) ────────── */
    #info { display: flex; align-items: stretch; background: linear-gradient(180deg,#15161c,#0a0b0f); border-left: 1px solid rgba(255,255,255,0.06); }
    .info-cell { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 4px; position: relative; }
    .info-cell + .info-cell::before { content:''; position:absolute; left:0; top:14px; bottom:14px; width:1px; background: rgba(255,255,255,0.08); }
    .info-lbl { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:9px; letter-spacing:0.16em; color: rgba(237,239,243,0.4); margin-bottom: 1px; }
    #period { width: 60px; }
    #period .v { font-weight: 700; font-size: 22px; color: var(--gold); line-height: 1; }
    #game { width: 96px; }
    #game .v { font-weight: 700; font-size: 30px; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; }
    #game .v.expired { color: #DE5B57; }
    #shot { width: 66px; }
    #shot .v { font-weight: 700; font-size: 30px; color: var(--gold); line-height: 1; font-variant-numeric: tabular-nums; }
    #shot.urgent .info-lbl, #shot.urgent .v { color: #DE5B57; }
    #jump { position:absolute; top:3px; left:50%; transform:translateX(-50%); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:8px; letter-spacing:0.2em; color:var(--gold); display:none; }

    /* ── Timeout callout ──────────────────────────── */
    #to-overlay { position:absolute; top:130px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0; transition:all .4s cubic-bezier(.175,.885,.32,1.275); }
    #to-overlay.visible { opacity:1; transform:translateX(-50%) translateY(0); }
    #to-main { display:flex; align-items:stretch; background:rgba(12,13,17,0.97); border-radius:10px; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.7); }
    #to-bar { width:6px; background:var(--gold); }
    #to-text { padding:13px 26px; }
    #to-team-name { font-weight:700; font-size:30px; line-height:1; }
    #to-sub { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; color:rgba(237,239,243,0.5); letter-spacing:0.28em; margin-top:3px; }
  </style>
</head>
<body>

<div id="score-bug">
  <div id="bar">

    <!-- League -->
    <div id="league">
      <div class="seal" id="lg-seal">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#E4BF55" stroke-width="1.4">
          <circle cx="12" cy="12" r="9.4"/>
          <path d="M12 2.6v18.8M2.6 12h18.8M5 5c3.5 2.5 3.5 11.5 0 14M19 5c-3.5 2.5-3.5 11.5 0 14" stroke-opacity="0.75"/>
        </svg>
        <img id="lg-logo" alt="" />
      </div>
      <div class="txt">
        <div class="l1" id="lg-l1">BASKETBALL</div>
        <div class="l2" id="lg-l2">THAI LEAGUE</div>
        <div class="yr" id="lg-yr">2026</div>
      </div>
    </div>

    <!-- Home logo -->
    <div class="logo-cell" style="--tc:#E86A3A;" id="lc-a">
      <div id="logo-ph-a" class="logo-ph">H</div>
      <img id="logo-img-a" class="logo-img" src="" alt="" />
    </div>

    <!-- Home panel -->
    <div class="panel" id="panel-a" style="--tc:#E86A3A;">
      <div class="pbg"></div><div class="seam"></div>
      <div class="inner">
        <div class="tname" id="nm-a">HOME</div>
        <div class="dashes" id="fd-a"></div>
        <div class="possline" id="poss-a"></div>
      </div>
    </div>

    <!-- Home score -->
    <div class="score-cell" id="scell-a"><div class="score-num" id="sc-a">0</div></div>

    <div id="center-div"></div>

    <!-- Away score -->
    <div class="score-cell" id="scell-b"><div class="score-num" id="sc-b">0</div></div>

    <!-- Away panel -->
    <div class="panel" id="panel-b" style="--tc:#2FA8DC;">
      <div class="pbg"></div><div class="seam"></div>
      <div class="inner">
        <div class="tname" id="nm-b">AWAY</div>
        <div class="dashes" id="fd-b"></div>
        <div class="possline" id="poss-b"></div>
      </div>
    </div>

    <!-- Away logo -->
    <div class="logo-cell" style="--tc:#2FA8DC;" id="lc-b">
      <div id="logo-ph-b" class="logo-ph">A</div>
      <img id="logo-img-b" class="logo-img" src="" alt="" />
    </div>

    <!-- Info -->
    <div id="info">
      <div class="info-cell" id="period"><div id="jump">JUMP</div><div class="info-lbl">PERIOD</div><div class="v" id="qlabel">1ST</div></div>
      <div class="info-cell" id="game"><div class="info-lbl">GAME</div><div class="v" id="mclock">10:00</div></div>
      <div class="info-cell" id="shot"><div class="info-lbl">SHOT</div><div class="v" id="shotval">24</div></div>
    </div>

  </div>

  <!-- Score pop layer (above the bar, not clipped) -->
  <div class="plus" id="plus-a" style="--pc:#E86A3A;">+2</div>
  <div class="plus" id="plus-b" style="--pc:#2FA8DC;">+2</div>
</div>

<!-- Timeout callout -->
<div id="to-overlay">
  <div id="to-main">
    <div id="to-bar"></div>
    <div id="to-text">
      <div id="to-team-name">TEAM</div>
      <div id="to-sub">TIMEOUT</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  const SERVER_URL = "https://scoreboard-control.onrender.com";

  firebase.initializeApp({
    apiKey: "AIzaSyBUOuEb5MWvZg2BWka1RPn5Qy4WDSDSO3I",
    authDomain: "basketball-tournament-62372.firebaseapp.com",
    databaseURL: "https://basketball-tournament-62372-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "basketball-tournament-62372",
  });
  const fbDb = firebase.database();

  let localState = null;
  let lastUpdateTimestamp = 0;
  let prevState = null;

  // ── Format helpers ──
  function fmtMain(t) {
    t = Math.max(0, t);
    if (t > 600) { const s = Math.floor(t / 10); return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }
    return Math.floor(t / 10) + "." + Math.floor(t % 10);
  }
  function fmtShot(t) { t = Math.max(0, t); return t > 100 ? Math.ceil(t / 10) : Math.floor(t / 10) + "." + Math.floor(t % 10); }
  function ordinal(q) { return q > 4 ? "OT" + (q - 4) : (["1ST","2ND","3RD","4TH"][q - 1] || ("Q" + q)); }

  // ── Main render ──
  function render(s) {
    if (!s || !s.teamA) return;

    if (prevState) {
      if (s.teamA.score > prevState.teamA.score) popScore('a', s.teamA.score - prevState.teamA.score);
      if (s.teamB.score > prevState.teamB.score) popScore('b', s.teamB.score - prevState.teamB.score);
      if (s.teamA.timeouts < prevState.teamA.timeouts) showTO(s.teamA.name, s.teamA.color);
      if (s.teamB.timeouts < prevState.teamB.timeouts) showTO(s.teamB.name, s.teamB.color);
    }

    updateTeam('a', s.teamA, s.possession === 'teamA');
    updateTeam('b', s.teamB, s.possession === 'teamB');

    document.getElementById('qlabel').textContent = ordinal(s.quarter);
    document.getElementById('jump').style.display = s.jumpBall ? "block" : "none";

    prevState = JSON.parse(JSON.stringify(s));
    localState = s;
    lastUpdateTimestamp = Date.now();
  }

  function updateTeam(id, team, isPoss) {
    document.getElementById(`lc-${id}`).style.setProperty('--tc', team.color);
    document.getElementById(`panel-${id}`).style.setProperty('--tc', team.color);

    document.getElementById(`sc-${id}`).textContent = team.score;

    const nmEl = document.getElementById(`nm-${id}`);
    nmEl.textContent = team.name;
    const l = team.name.length;
    nmEl.style.fontSize = l <= 6 ? "28px" : l <= 10 ? "24px" : l <= 14 ? "19px" : "15px";
    nmEl.classList.toggle('poss', isPoss);

    // keep the no-logo placeholder letter in sync with the live team name
    document.getElementById(`logo-ph-${id}`).textContent = (team.name || (id === 'a' ? 'H' : 'A'))[0];

    // foul dashes (5)
    const fouls = Math.min(team.teamFouls || 0, 5);
    const bonus = (team.teamFouls || 0) >= 5;
    const fd = document.getElementById(`fd-${id}`);
    fd.innerHTML = '';
    for (let i = 0; i < 5; i++) {
      const d = document.createElement('div');
      d.className = 'dash' + (i < fouls ? (bonus ? ' on bonus' : ' on') : '');
      fd.appendChild(d);
    }

    document.getElementById(`poss-${id}`).className = 'possline' + (isPoss ? ' on' : '');
  }

  // ── Clock interpolation ──
  function syncLoop() {
    if (localState && localState.isRunning) {
      const elapsed = Date.now() - lastUpdateTimestamp;
      const cur = Math.max(0, localState.clockTenths - Math.floor(elapsed / 100));
      const m = document.getElementById('mclock');
      m.textContent = fmtMain(cur);
      m.classList.toggle('expired', cur <= 0);
    } else if (localState) {
      document.getElementById('mclock').textContent = fmtMain(localState.clockTenths);
    }

    if (localState) {
      let cur = localState.shotClockTenths;
      if (localState.shotRunning) { const e = Date.now() - lastUpdateTimestamp; cur = Math.max(0, localState.shotClockTenths - Math.floor(e / 100)); }
      document.getElementById('shotval').textContent = fmtShot(cur);
      document.getElementById('shot').classList.toggle('urgent', cur <= 50 && cur > 0);
    }
    requestAnimationFrame(syncLoop);
  }
  requestAnimationFrame(syncLoop);

  // ── Score pop (+N at the number) ──
  function popScore(side, pts) {
    const plus = document.getElementById(`plus-${side}`);
    const num  = document.getElementById(`sc-${side}`);
    // Position the badge over the score number (relative to #score-bug)
    const bug = document.getElementById('score-bug').getBoundingClientRect();
    const n = num.getBoundingClientRect();
    plus.style.left = ((n.left - bug.left) + n.width / 2) + 'px';
    plus.style.top  = ((n.top  - bug.top) - 6) + 'px';
    plus.textContent = `+${pts}`;
    plus.classList.remove('go'); void plus.offsetWidth; plus.classList.add('go');
    num.classList.remove('bump'); void num.offsetWidth; num.classList.add('bump');
  }

  // ── Timeout callout ──
  function showTO(name, color) {
    const el = document.getElementById('to-overlay');
    const nm = document.getElementById('to-team-name');
    nm.textContent = name; nm.style.color = color;
    document.getElementById('to-bar').style.background = color;
    el.classList.add('visible');
    clearTimeout(showTO._t);
    showTO._t = setTimeout(() => el.classList.remove('visible'), 5000);
  }

  // ── Firebase league branding sync ──
  fbDb.ref('overlay_config/league').on('value', snap => {
    const v = snap.val() || {};
    const seal = document.getElementById('lg-seal');
    const img  = document.getElementById('lg-logo');
    if (v.logo && v.logo.trim() !== '') { img.src = v.logo; seal.classList.add('has-logo'); }
    else { seal.classList.remove('has-logo'); img.removeAttribute('src'); }
    setLeagueLine('lg-l1', v.line1 != null ? v.line1 : 'BASKETBALL');
    setLeagueLine('lg-l2', v.line2 != null ? v.line2 : 'THAI LEAGUE');
    setLeagueLine('lg-yr', v.year  != null ? v.year  : '2026');
  });
  function setLeagueLine(id, txt) {
    const el = document.getElementById(id);
    el.textContent = txt || '';
    el.style.display = (txt && String(txt).trim() !== '') ? '' : 'none';
  }

  // ── Firebase logo sync ──
  fbDb.ref('player_data/teamA/logo').on('value', snap => updateLogo('a', snap.val()));
  fbDb.ref('player_data/teamB/logo').on('value', snap => updateLogo('b', snap.val()));
  function updateLogo(id, url) {
    const img = document.getElementById(`logo-img-${id}`);
    const ph  = document.getElementById(`logo-ph-${id}`);
    if (url && url.trim() !== "") {
      img.src = url;
      img.onload = () => { img.classList.add('show'); ph.classList.add('hide'); };
    } else {
      img.classList.remove('show'); ph.classList.remove('hide');
    }
  }

  // ── Socket ──
  function init() {
    const script = document.createElement('script');
    script.src = `${SERVER_URL}/socket.io/socket.io.js`;
    script.onload = () => { const socket = io(SERVER_URL, { reconnection: true }); socket.on('stateUpdate', render); };
    document.head.appendChild(script);
  }
  init();
</script>
</body>
</html>
